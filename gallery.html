<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Flower Gallery</title>

    <link rel="stylesheet" href="gallery.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <header>
        <h1>Flower Photo Gallery</h1>
    </header>

    <main>

        <div id="gallery">

            <div id="largeImage">
                <img id="lgPic" src="yellow_pompom_mum.jpg" alt="Yellow Pompom Mum">

                <p id="lgTitle">Yellow Pompom Mum</p>
            </div>

            <div id="thumbs">

                <img src="yellow_pompom_mum.jpg"
                    alt="Yellow Pompom Mum">

                <img src="purple_single_mum.jpg"
                    alt="Purple Single Mum">

                <img src="white_double_mum.jpg"
                    alt="White Double Mum">

                <img src="pink_single_mum.jpg"
                    alt="Pink Single Mum">

                <img src="sunburst_daisy_mum.jpg"
                    alt="Sunburst Daisy Mum">

                <img src="magenta_daisy_mum.jpg"
                    alt="Magenta Daisy Mum">

            </div>

        </div>

    </main>

    <footer>
        <hr>
        <p>Brookhaven College WebDev</p>
    </footer>

    <script src="gallery.js"></script>

</body>

</html>
